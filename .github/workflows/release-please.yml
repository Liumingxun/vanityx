name: release-please

on:
  push:
    branches:
      - main
      - ci/*
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

  release:
    needs: release-please
    if: ${{ false && needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
        with:
          run_install: true
      - run: pnpm build
      - run: gh release upload ./dist/*
        env:
          GH_TOKEN: ${{ github.token }}

